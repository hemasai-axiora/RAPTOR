version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: raptor-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: raptor_crm_db
    ports:
      - "3307:3306"
    volumes:
      - raptor_db_data:/var/lib/mysql

  web:
    image: mediatrack-web
    container_name: raptor-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  raptor_db_data:
